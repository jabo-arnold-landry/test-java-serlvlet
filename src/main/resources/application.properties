# ============================================================
# SPCMS - SmartPower & Cooling Management System
# Shared Configuration for 45+ Student Team
# ============================================================

# --- Server ---
server.port=8081
# Context path is determined by# Do NOT set context-path here when using external Tomcat

# --- PostgreSQL Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/spcms_db
spring.datasource.username=spcms_user
spring.datasource.password=spcms_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JSP View Resolver ---
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# --- File Upload (Service Reports, Photos) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# --- Email (Alert Notifications) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Logging ---
logging.level.com.spcms=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- Daily Consolidated Report Auto-Generation ---
# Runs at 00:05 every day and generates report for previous day.
report.daily.auto.enabled=true
report.daily.auto.cron=0 5 0 * * *
report.daily.auto.zone=Africa/Nairobi
