# ============================================================
# SPCMS - SmartPower & Cooling Management System
# Shared Configuration for 45+ Student Team
# ============================================================

# --- Server ---
server.port=8081
# Context path for external Tomcat deployment
# Leave empty for external Tomcat; context is controlled by the container (e.g., /spcms)
# server.servlet.context-path=/spcms

# --- Database (H2 fallback) ---
spring.datasource.url=jdbc:h2:mem:spcms;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- JSP View Resolver ---
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# --- File Upload (Service Reports, Photos) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# --- Email (Alert Notifications) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Logging ---
logging.level.com.spcms=DEBUG
logging.level.org.hibernate.SQL=DEBUG
