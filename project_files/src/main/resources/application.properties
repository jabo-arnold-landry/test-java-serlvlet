# ============================================================
# SPCMS - SmartPower & Cooling Management System
# Shared Configuration for 45+ Student Team
# ============================================================

# --- Server ---
server.port=8081
server.servlet.context-path=/spcms
# Context path is determined by# Do NOT set context-path here when using external Tomcat

# --- MySQL Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/spcms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&allowMultiQueries=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# --- HikariCP Connection Pool ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=30000

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- JSP View Resolver ---
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# --- File Upload (Service Reports, Photos) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# --- Email (Alert Notifications) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=realyloaded@gmail.com
spring.mail.password=oubpcmribflmadeb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Alert Configuration ---
spcms.alerts.auto-send-email=true

# --- Logging ---
logging.level.com.spcms=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- Error Handling ---
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true
spring.web.resources.add-mappings=true
spring.mvc.throw-exception-if-no-handler-found=false
